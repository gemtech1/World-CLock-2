<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="src/styles.css" rel="stylesheet" type="text/css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.37/moment-timezone-with-data-1970-2030.min.js"></script>
    <title>World Clock</title>
  </head>
  <body>
    <h1>World Clock</h1>

    <script src="src/index.js"></script>
  </body>
  <div class="container">
    <h1>World Clock</h1>

    <select id="city">
      <option value="">Select a city..</option>
      <option value="current">My current location</option>
      <option value="">London</option>
      <option value="">New York</option>
      <option value="">Auckland</option>
    </select>

    <div id="cities">
      <div class="city" id="losangelo">
        <h2>Los Angeles 🇺🇸</h2>
        <div class="date" id="date">August 15th 2022</div>
        <div class="time" date="time">1:48:15 AM</div>
      </div>
      <div class="city" id="paris">
        <h2>Paris 🇦🇺</h2>
        <div class="date">August 15th 2022</div>
        <div class="time">1:48:15 AM</div>
      </div>
    </div>
  </div>
  <footer>
    This project was coded with ❤️ by Ladi Akor and is
    <a
      href="https://github.com/gemtech1/World-CLock-2/blob/main/index.html"
      target="_blank"
    >
      open sourced on GitHub
    </a>
  </footer>
  <script src="javascript/index.js"></script>
</html>
